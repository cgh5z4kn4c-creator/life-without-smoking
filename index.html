<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>харе дудеть</title>
<style>

  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

  :root{
    --navy-deep:   #061224;
    --navy:        #0B1E3D;
    --navy-mid:    #142B52;
    --steel:       #5C7A99;
    --ice:         #6FD0FF;
    --ice-soft:    #9FE3FF;
    --paper:       #EAF1F8;
    --paper-dim:   #B9C9DC;
    --line:        rgba(159,227,255,0.14);
  }

  *{ margin:0; padding:0; box-sizing:border-box; }

  html{ scroll-behavior:smooth; }

  body{
    background: var(--navy-deep);
    color: var(--paper);
    font-family:'Inter', sans-serif;
    min-height:100vh;
    overflow-x:hidden;
    position:relative;
  }

  .sky{
    position:fixed;
    inset:0;
    z-index:0;
    background:
      radial-gradient(ellipse 900px 600px at 18% -5%, rgba(111,208,255,0.16), transparent 60%),
      radial-gradient(ellipse 700px 500px at 100% 10%, rgba(95,160,220,0.10), transparent 65%),
      linear-gradient(180deg, var(--navy-deep) 0%, var(--navy) 55%, var(--navy-deep) 100%);
  }

  .haze{
    position:fixed;
    inset:0;
    z-index:0;
    pointer-events:none;
    opacity:0.5;
  }
  .haze span{
    position:absolute;
    border-radius:50%;
    filter: blur(40px);
    background: radial-gradient(circle, rgba(159,227,255,0.20), transparent 70%);
    animation: drift 38s linear infinite;
  }
  .haze span:nth-child(1){ width:380px; height:380px; left:-5%; top:10%; animation-duration:46s; }
  .haze span:nth-child(2){ width:300px; height:300px; left:60%; top:55%; animation-duration:34s; animation-delay:-8s; }
  .haze span:nth-child(3){ width:240px; height:240px; left:30%; top:75%; animation-duration:52s; animation-delay:-20s; }
  .haze span:nth-child(4){ width:200px; height:200px; left:80%; top:5%; animation-duration:40s; animation-delay:-5s; }

  @keyframes drift{
    0%   { transform: translate(0,0) scale(1); }
    50%  { transform: translate(40px,-50px) scale(1.15); }
    100% { transform: translate(0,0) scale(1); }
  }

  @media (prefers-reduced-motion: reduce){
    .haze span{ animation: none; }
  }

  main{
    position:relative;
    z-index:1;
    max-width:920px;
    margin:0 auto;
    padding: 0 28px 100px;
  }

  header.hero{
    padding: 70px 0 10px;
    text-align:center;
  }

  @media (max-width:560px){
    header.hero{ padding: 28px 0 0; }
  }

  .eyebrow{
    font-family:'JetBrains Mono', monospace;
    font-size:12.5px;
    letter-spacing:0.22em;
    text-transform:uppercase;
    color: var(--ice-soft);
    opacity:0.85;
    margin-bottom:22px;
  }

  .eyebrow::before{
    content:"●  ";
    color:#7CF0A0;
  }

  h1{
    font-family:'Fraunces', serif;
    font-weight:400;
    font-size: clamp(30px, 5.2vw, 50px);
    line-height:1.18;
    letter-spacing:-0.01em;
    color: var(--paper);
    max-width:680px;
    margin: 0 auto 18px;
  }

  h1 em{
    font-style:italic;
    color: var(--ice);
  }

  .sub{
    color: var(--paper-dim);
    font-size:16px;
    line-height:1.6;
    max-width:520px;
    margin: 0 auto;
  }

  /* ===== центральный счётчик времени ===== */
  .timer-frame{
    margin: 56px 0 14px;
    display:flex;
    justify-content:center;
  }

  @media (max-width:560px){
    .timer-frame{ margin: 30px 0 14px; }
  }

  .timer{
    position:relative;
    display:flex;
    flex-wrap:nowrap;
    justify-content:center;
    align-items:center;
    gap: clamp(14px, 3vw, 28px);
    padding: 38px clamp(20px, 5vw, 52px) 30px;
    border:1px solid var(--line);
    border-radius: 22px;
    background: linear-gradient(180deg, rgba(20,43,82,0.55), rgba(6,18,36,0.55));
    backdrop-filter: blur(6px);
    box-shadow: 0 30px 80px -30px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.04);
  }

  @media (max-width:420px){
    .timer{ padding: 28px 14px 22px; gap:10px; }
    .pair{ gap:10px; }
    .seg{ min-width:46px; }
  }

  .pair{
    display:flex;
    align-items:stretch;
    gap: clamp(10px, 3vw, 28px);
  }

  .tline{
    width:1px;
    align-self:stretch;
    background: var(--line);
  }

  

  .timer::before{
    content:"";
    position:absolute;
    inset:-1px;
    border-radius:22px;
    padding:1px;
    background: linear-gradient(135deg, rgba(111,208,255,0.35), transparent 40%, transparent 60%, rgba(111,208,255,0.15));
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    pointer-events:none;
  }

  .seg{
    text-align:center;
    min-width: 64px;
  }

  .seg .num{
    font-family:'Fraunces', serif;
    font-weight:500;
    font-size: clamp(34px, 8vw, 64px);
    line-height:1;
    color: var(--paper);
    font-variant-numeric: tabular-nums;
    min-width: 2ch;
    display:inline-block;
  }

  @media (max-width:420px){
    .seg .num{ font-size: clamp(26px, 7.5vw, 64px); }
  }

  .seg .num span.accent{ color: var(--ice); }

  .seg .lbl{
    margin-top:10px;
    font-family:'JetBrains Mono', monospace;
    font-size:10.5px;
    letter-spacing:0.16em;
    text-transform:uppercase;
    color: var(--steel);
  }


  .since{
    text-align:center;
    margin-top:20px;
    font-family:'JetBrains Mono', monospace;
    font-size:12px;
    letter-spacing:0.04em;
    color: var(--paper-dim);
    opacity:0.75;
  }

  /* ===== карточки статистики ===== */
  .stats{
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap:20px;
    margin-top:40px;
  }

  @media (max-width:620px){
    .stats{ grid-template-columns: 1fr; }
  }

  .card{
    position:relative;
    border:1px solid var(--line);
    border-radius:18px;
    padding: 32px 30px 28px;
    background: linear-gradient(165deg, rgba(20,43,82,0.42), rgba(6,18,36,0.42));
    overflow:hidden;
  }

  .card::after{
    content:"";
    position:absolute;
    width:160px; height:160px;
    right:-50px; top:-60px;
    background: radial-gradient(circle, rgba(111,208,255,0.16), transparent 70%);
    pointer-events:none;
  }

  .card .tag{
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color: var(--steel);
    margin-bottom:16px;
  }

  .card .value{
    font-family:'Fraunces', serif;
    font-weight:500;
    font-size: clamp(34px, 6vw, 46px);
    color: var(--ice-soft);
    line-height:1;
    font-variant-numeric: tabular-nums;
  }

  .card .value .unit{
    font-family:'Inter', sans-serif;
    font-size:17px;
    font-weight:500;
    color: var(--paper-dim);
    margin-left:8px;
  }

  .card .note{
    margin-top:14px;
    font-size:13.5px;
    line-height:1.55;
    color: var(--paper-dim);
  }

  /* ===== полоса с условиями расчёта ===== */
  .basis{
    margin-top:48px;
    border:1px solid var(--line);
    border-radius:16px;
    padding:24px 28px;
    background: rgba(11,30,61,0.35);
  }

  .basis .tag{
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color: var(--steel);
    margin-bottom:14px;
  }

  .basis ul{
    list-style:none;
    display:grid;
    grid-template-columns: repeat(3, 1fr);
    gap:16px;
  }

  @media (max-width:620px){
    .basis ul{ grid-template-columns: 1fr; }
  }

  .basis li{
    font-size:13.5px;
    color: var(--paper-dim);
    line-height:1.5;
    border-left:2px solid var(--ice);
    padding-left:12px;
  }

  .basis li b{
    display:block;
    color: var(--paper);
    font-size:15px;
    font-weight:600;
    margin-bottom:2px;
  }

  footer{
    text-align:center;
    margin-top:64px;
    color: var(--steel);
    font-size:13px;
    line-height:1.7;
  }

  footer .line{
    width:48px;
    height:1px;
    background: var(--line);
    margin: 0 auto 22px;
  }

</style>
</head>
<body>

<div class="sky"></div>
<div class="haze"><span></span><span></span><span></span><span></span></div>

<main>

  <header class="hero"></header>

  <div class="timer-frame">
    <div class="timer" id="timer">
      <div class="pair">
        <div class="seg"><div class="num" id="d">00</div><div class="lbl">дней</div></div>
        <div class="tline"></div>
        <div class="seg"><div class="num" id="h">00</div><div class="lbl">часов</div></div>
      </div>
      <div class="tline tline-mid"></div>
      <div class="pair">
        <div class="seg"><div class="num" id="m">00</div><div class="lbl">минут</div></div>
        <div class="tline"></div>
        <div class="seg"><div class="num"><span class="accent" id="s">00</span></div><div class="lbl">секунд</div></div>
      </div>
    </div>
  </div>
  <div class="since">без стика с 16.06.2026, 17:20</div>

  <section class="stats">
    <div class="card">
      <div class="tag">Не выкурено</div>
      <div class="value"><span id="cigs">0</span><span class="unit">стиков</span></div>
    </div>
    <div class="card">
      <div class="tag">Сэкономлено</div>
      <div class="value"><span id="money">0</span><span class="unit">грн</span></div>
    </div>
  </section>

  <footer>
    <div class="line"></div>
    Цифры обновляются автоматически, без участия посетителя.<br>
    Страница не запрашивает и не хранит никаких личных данных.
  </footer>

</main>

<script>
  // Момент отказа от курения — фиксированная точка отсчёта.
  // Указана в формате с явным смещением часового пояса (Кийов, UTC+3 на момент даты).
  const START = new Date("2026-06-16T17:20:00+03:00").getTime();

  const PER_DAY = 30;          // стиков в сутки
  const PRICE   = 7.25;        // грн за стик
  const PER_MS  = PER_DAY / 86400000; // стиков в миллисекунду

  const elD = document.getElementById('d');
  const elH = document.getElementById('h');
  const elM = document.getElementById('m');
  const elS = document.getElementById('s');
  const elCigs  = document.getElementById('cigs');
  const elMoney = document.getElementById('money');

  function pad(n){ return String(n).padStart(2,'0'); }

  function fmtInt(n){
    return Math.floor(n).toLocaleString('ru-RU');
  }

  function fmtMoney(n){
    return n.toLocaleString('ru-RU', { minimumFractionDigits:2, maximumFractionDigits:2 });
  }

  function tick(){
    const now = Date.now();
    const diff = Math.max(0, now - START);

    const totalSec = Math.floor(diff / 1000);
    const days = Math.floor(totalSec / 86400);
    const hours = Math.floor((totalSec % 86400) / 3600);
    const mins  = Math.floor((totalSec % 3600) / 60);
    const secs  = totalSec % 60;

    elD.textContent = pad(days);
    elH.textContent = pad(hours);
    elM.textContent = pad(mins);
    elS.textContent = pad(secs);

    const cigsAvoided = diff * PER_MS;
    const moneySaved = cigsAvoided * PRICE;

    elCigs.textContent = fmtInt(cigsAvoided);
    elMoney.textContent = fmtMoney(moneySaved);
  }

  tick();
  setInterval(tick, 1000);
</script>

</body>
</html>
